# Reproducible Benchmark v2: no local build of Arcane infra or swarm.
# Requires public (or reachable) images — set ARCANE_INFRA_IMAGE and ARCANE_SWARM_IMAGE
# in the same .env file used by Run-Benchmark-V2.ps1 (-UsePublishedImages), or export them.
#
# Example:
#   ARCANE_INFRA_IMAGE=ghcr.io/martinjms/arcane-benchmark-infra:v1.0.0
#   ARCANE_SWARM_IMAGE=ghcr.io/martinjms/arcane-benchmark-swarm:v1.0.0

name: arcane-benchmark-v2

services:
  redis:
    image: redis:7-alpine
    container_name: arcane-v2-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  spacetimedb:
    image: ${SPACETIME_IMAGE:-clockworklabs/spacetime:latest}
    container_name: arcane-v2-spacetimedb
    ports:
      - "3000:3000"
    command: ["start"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g

  manager:
    image: ${ARCANE_INFRA_IMAGE}
    container_name: arcane-v2-manager
    command: ["arcane-manager"]
    environment:
      MANAGER_HTTP_PORT: "8081"
      MANAGER_CLUSTERS: ${MANAGER_CLUSTERS}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  cluster1:
    image: ${ARCANE_INFRA_IMAGE}
    container_name: arcane-v2-cluster1
    command: ["arcane-cluster"]
    profiles: ["c1"]
    environment:
      CLUSTER_ID: "11111111-1111-1111-1111-111111111111"
      CLUSTER_WS_PORT: "8090"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_1}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  cluster2:
    image: ${ARCANE_INFRA_IMAGE}
    container_name: arcane-v2-cluster2
    command: ["arcane-cluster"]
    profiles: ["c2"]
    environment:
      CLUSTER_ID: "22222222-2222-2222-2222-222222222222"
      CLUSTER_WS_PORT: "8091"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_2}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  cluster3:
    image: ${ARCANE_INFRA_IMAGE}
    container_name: arcane-v2-cluster3
    command: ["arcane-cluster"]
    profiles: ["c3"]
    environment:
      CLUSTER_ID: "33333333-3333-3333-3333-333333333333"
      CLUSTER_WS_PORT: "8092"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_3}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  swarm:
    image: ${ARCANE_SWARM_IMAGE}
    container_name: arcane-v2-swarm
    profiles: ["swarm"]
    entrypoint: ["sleep", "infinity"]

networks:
  default:
    name: arcane-v2-net
