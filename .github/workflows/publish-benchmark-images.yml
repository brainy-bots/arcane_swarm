# Build and push Benchmark v2 images to GHCR (arcane-benchmark-infra, arcane-benchmark-swarm).
#
# Triggers:
#   - workflow_dispatch: set "Image tag" (e.g. v1.0.0 or latest)
#   - git tag push: benchmark-images/v1.0.0  →  images tagged v1.0.0
#
# Submodule arcane/: if private, add repo secret ARCANE_SUBMODULE_PAT (read access to arcane).
# If arcane is public, the default GITHUB_TOKEN is enough for checkout.
#
# After first push: open https://github.com/<owner>?tab=packages → each package → Package settings
# → Change visibility to Public (so reproducers can pull without login).

name: Publish benchmark images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag for both images (e.g. v1.0.0)"
        required: true
        default: "latest"
  push:
    tags:
      - "benchmark-images/**"

concurrency:
  group: publish-benchmark-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase owner (GHCR)
        id: o
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/benchmark-images/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # For private submodule https://github.com/brainy-bots/arcane — set ARCANE_SUBMODULE_PAT
          token: ${{ secrets.ARCANE_SUBMODULE_PAT || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arcane-benchmark-infra
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.arcane-infra
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/arcane-benchmark-infra:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push arcane-benchmark-swarm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.swarm
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/arcane-benchmark-swarm:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ steps.o.outputs.owner }}/arcane-benchmark-infra:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ steps.o.outputs.owner }}/arcane-benchmark-swarm:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
