name: arcane-benchmark-v2

services:
  redis:
    image: redis:7-alpine
    container_name: arcane-v2-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  spacetimedb:
    image: ${SPACETIME_IMAGE:-clockworklabs/spacetime:latest}
    container_name: arcane-v2-spacetimedb
    ports:
      # Needed because the benchmark harness uses the host `spacetime` CLI to build/publish.
      - "3000:3000"
    # Mirrors `docker run clockworklabs/spacetime start`
    command: ["start"]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g

  manager:
    build:
      context: .
      dockerfile: docker/Dockerfile.arcane-infra
    image: arcane-v2/infra:latest
    container_name: arcane-v2-manager
    command: ["arcane-manager"]
    environment:
      MANAGER_HTTP_PORT: "8081"
      MANAGER_CLUSTERS: ${MANAGER_CLUSTERS}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  cluster1:
    image: arcane-v2/infra:latest
    container_name: arcane-v2-cluster1
    command: ["arcane-cluster"]
    profiles: ["c1"]
    environment:
      CLUSTER_ID: "11111111-1111-1111-1111-111111111111"
      CLUSTER_WS_PORT: "8090"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_1}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  cluster2:
    image: arcane-v2/infra:latest
    container_name: arcane-v2-cluster2
    command: ["arcane-cluster"]
    profiles: ["c2"]
    environment:
      CLUSTER_ID: "22222222-2222-2222-2222-222222222222"
      CLUSTER_WS_PORT: "8091"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_2}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  cluster3:
    image: arcane-v2/infra:latest
    container_name: arcane-v2-cluster3
    command: ["arcane-cluster"]
    profiles: ["c3"]
    environment:
      CLUSTER_ID: "33333333-3333-3333-3333-333333333333"
      CLUSTER_WS_PORT: "8092"
      REDIS_URL: "redis://redis:6379"
      NEIGHBOR_IDS: ${NEIGHBOR_IDS_3}
    depends_on:
      - manager
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  swarm:
    build:
      context: .
      dockerfile: docker/Dockerfile.swarm
    image: arcane-v2/swarm:latest
    container_name: arcane-v2-swarm
    profiles: ["swarm"]
    entrypoint: ["sleep", "infinity"]

networks:
  default:
    name: arcane-v2-net
